<!DOCTYPE html>
<html>
<head>
    <title>Deployment Debug Tool</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        .info { background-color: #d1ecf1; }
    </style>
</head>
<body>
    <h1>🔍 Deployment Debug Tool</h1>
    
    <div id="results"></div>
    
    <button onclick="runTests()">Run Tests</button>
    
    <script>
        async function runTests() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Running tests...</h2>';
            
            const tests = [];
            
            // Test 1: Check if VITE_BACKEND_URL is set
            const backendUrl = import.meta.env.VITE_BACKEND_URL || 'http://localhost:3001';
            tests.push({
                name: 'Environment Variable Check',
                result: `VITE_BACKEND_URL = ${backendUrl}`,
                status: backendUrl.includes('localhost') ? 'error' : 'success'
            });
            
            // Test 2: Test backend health endpoint
            try {
                const healthResponse = await fetch(`${backendUrl}/health`);
                const healthData = await healthResponse.json();
                tests.push({
                    name: 'Backend Health Check',
                    result: `Status: ${healthResponse.status}, Message: ${healthData.message}`,
                    status: healthResponse.ok ? 'success' : 'error'
                });
            } catch (error) {
                tests.push({
                    name: 'Backend Health Check',
                    result: `Error: ${error.message}`,
                    status: 'error'
                });
            }
            
            // Test 3: Test CORS
            try {
                const corsResponse = await fetch(`${backendUrl}/api/analyze-resume`, {
                    method: 'OPTIONS'
                });
                tests.push({
                    name: 'CORS Check',
                    result: `CORS Status: ${corsResponse.status}`,
                    status: corsResponse.ok ? 'success' : 'error'
                });
            } catch (error) {
                tests.push({
                    name: 'CORS Check',
                    result: `CORS Error: ${error.message}`,
                    status: 'error'
                });
            }
            
            // Test 4: Test API endpoint with dummy data
            try {
                const apiResponse = await fetch(`${backendUrl}/api/analyze-resume`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        fileContent: 'Test resume content'
                    }),
                });
                tests.push({
                    name: 'API Endpoint Test',
                    result: `API Status: ${apiResponse.status}`,
                    status: apiResponse.ok ? 'success' : 'error'
                });
            } catch (error) {
                tests.push({
                    name: 'API Endpoint Test',
                    result: `API Error: ${error.message}`,
                    status: 'error'
                });
            }
            
            // Display results
            let html = '<h2>Test Results:</h2>';
            tests.forEach(test => {
                html += `<div class="test ${test.status}">
                    <strong>${test.name}:</strong> ${test.result}
                </div>`;
            });
            
            results.innerHTML = html;
        }
    </script>
</body>
</html>
