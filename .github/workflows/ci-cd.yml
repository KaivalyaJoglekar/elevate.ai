name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt ruff

      - name: Lint backend
        run: ruff check server --select E9,F63,F7,F82

      - name: Compile backend modules
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          excluded_dirs = {".venv", "venv", "__pycache__"}

          for path in Path("server").rglob("*.py"):
              if any(part in excluded_dirs for part in path.parts):
                  continue
              py_compile.compile(str(path), doraise=True)
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
