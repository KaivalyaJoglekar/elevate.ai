[build]
  builder = "nixpacks"
  buildCommand = "cd server && pip install -r requirements.txt"

[deploy]
  startCommand = "cd server && uvicorn main:app --host 0.0.0.0 --port $PORT"
  restartPolicyType = "always"

[environment]
  NIXPACKS_PYTHON_VERSION = "3.13"
  PYTHONUNBUFFERED = "1"

# Tell Railway to only deploy the server directory
[paths]
  include = ["server/**"]
